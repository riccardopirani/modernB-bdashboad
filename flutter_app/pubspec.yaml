name: lockflow
description: Multi-tenant property management SaaS for TTLock integration
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  go_router: ^13.0.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Supabase & Auth
  supabase_flutter: ^1.10.0

  # UI Components & Design
  flutter_svg: ^2.0.0
  lucide_icons: ^0.257.0

  # Material & Animations
  animations: ^2.0.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0

  # Local Storage
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

  # Testing
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
